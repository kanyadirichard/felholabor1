{% extends 'base.html' %}

{% block content %} 
    <div class="card shadow-lg mt-4 border-0"> 
        
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h3 class="mb-0 text-dark">{{ photo.title }}</h3>
            
            <div class="d-flex align-items-center">
                {% if user == photo.owner %}
                    <a href="{% url 'photo_delete' photo.pk %}" class="btn btn-danger btn-sm shadow-sm me-2">
                        Kép törlése
                    </a>
                {% endif %}
                <a href="{% url 'photo_list' %}" class="btn btn-outline-secondary btn-sm shadow-sm">
                    Vissza a listához
                </a>
            </div>
        </div>
        
        <div class="card-body text-center bg-light">
            {% if photo.image %}
                <img src="{{ photo.image.url }}" class="img-fluid rounded shadow" alt="{{ photo.title }}" style="max-height: 75vh; object-fit: contain;">
            {% endif %}
        </div>
        
        <div class="card-footer text-muted bg-white py-3">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <span class="badge bg-secondary">Feltöltötte: {{ photo.owner.username }}</span>
                </div>
                <div class="col-md-6 text-end small">
                    <strong>Dátum:</strong> {{ photo.uploaded_at|date:"Y. m. d. H:i" }}
                </div>
            </div>
        </div>
    </div>
{% endblock %}
