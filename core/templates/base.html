<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BME Fotóalbum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-gradient py-3 shadow mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 d-flex align-items-center" href="{% url 'photo_list' %}">
                <i class="bi bi-camera-fill text-warning me-2 fs-3"></i> 
                <span>Fotóalbum</span>
            </a>
            
            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-4 text-light d-flex align-items-center">
                        <i class="bi bi-person-circle fs-5 me-2"></i>
                        <span>Szia, <b class="text-white">{{ user.username }}</b>!</span>
                    </span>
                    
                    <a href="{% url 'photo_upload' %}" class="btn btn-success btn-sm me-3 fw-bold shadow-sm d-flex align-items-center">
                        <i class="bi bi-plus-lg me-1"></i> Új kép
                    </a>
                    
                    <form action="{% url 'logout' %}" method="post" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm shadow-sm d-flex align-items-center">
                            <i class="bi bi-box-arrow-right me-1"></i> Kilépés
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-3 px-3">Belépés</a>
                    <a href="{% url 'signup' %}" class="btn btn-warning btn-sm fw-bold px-3 shadow-sm">Regisztráció</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
