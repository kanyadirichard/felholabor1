<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BME Fotóalbum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'photo_list' %}">📸 Fotóalbum</a>
            
            <div class="d-flex">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-3 text-white">
                        Szia, <b>{{ user.username }}</b>!
                    </span>
                    <a href="{% url 'photo_upload' %}" class="btn btn-primary btn-sm me-2">Új kép feltöltése</a>
                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm">Kilépés</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Belépés</a>
                    <a href="{% url 'signup' %}" class="btn btn-warning btn-sm">Regisztráció</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
