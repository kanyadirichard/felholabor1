{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center">
                <h3 class="mb-0">Belépés</h3>
            </div>
            <div class="card-body p-4">
                
                {% if form.non_field_errors %}
                    <div class="alert alert-danger" role="alert">
                        <strong>Hiba!</strong> Helytelen felhasználónév vagy jelszó.
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Felhasználónév</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Jelszó</label>
                        {{ form.password }}
                    </div>

                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Belépés</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center bg-light">
                <small class="text-muted">Még nincs fiókod? <a href="{% url 'signup' %}" class="fw-bold text-decoration-none">Regisztrálj itt!</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
