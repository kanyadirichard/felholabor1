{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Regisztráció</h3>
            </div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            
                            {{ field }} {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {{ field.errors.0 }}
                                </div>
                            {% endif %}
                            
                            {% if field.help_text %}
                                <div class="form-text text-muted" style="font-size: 0.85rem;">
                                    {{ field.help_text|safe }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-success w-100 mt-3">Regisztráció</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <small>Már van fiókod? <a href="{% url 'login' %}">Jelentkezz be!</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
